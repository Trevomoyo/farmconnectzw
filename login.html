<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FarmConnectZW</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">🌾</div>
    <h1 class="login-title">FarmConnectZW</h1>
    <p class="login-subtitle">National Agricultural Coordination Platform</p>

    <!-- Tabs -->
    <div class="login-tabs">
      <div class="login-tab active" id="tab-signin">Sign In</div>
      <div class="login-tab"        id="tab-register">Register</div>
    </div>

    <!-- Sign-in form -->
    <div id="form-signin">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="si-email" class="form-input" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="si-password" class="form-input" type="password" placeholder="Password" autocomplete="current-password">
      </div>
      <p id="si-error" class="form-error mb-16 hidden"></p>
      <button id="si-btn" class="btn btn-primary btn-full">Sign In</button>
      <p class="text-center text-sm text-gray" style="margin-top:16px;">
        <a href="#" id="forgot-link">Forgot password?</a>
      </p>
    </div>

    <!-- Google Sign-In — always visible, works for both sign-in and register -->
    <div class="login-divider" id="google-divider">or</div>
    <button id="google-signin-btn" class="btn btn-google btn-full">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>

    <!-- Register form -->
    <div id="form-register" class="hidden">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input id="reg-name" class="form-input" type="text" placeholder="Your name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="reg-email" class="form-input" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Phone (optional)</label>
        <input id="reg-phone" class="form-input" type="tel" placeholder="07X XXX XXXX">
      </div>
      <div class="form-group">
        <label class="form-label">District</label>
        <select id="reg-district" class="form-select">
          <option value="">Select district…</option>
          <option>Harare</option><option>Bulawayo</option><option>Mutare</option>
          <option>Gweru</option><option>Kwekwe</option><option>Chinhoyi</option>
          <option>Masvingo</option><option>Bindura</option><option>Kadoma</option>
          <option>Zvishavane</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Account Type</label>
        <select id="reg-role" class="form-select">
          <option value="farmer">Farmer</option>
          <option value="extension_officer">Extension Officer</option>
        </select>
        <span class="form-error text-sm">Administrator accounts are created by system admins only.</span>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="reg-password" class="form-input" type="password" placeholder="Min 6 characters">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input id="reg-confirm" class="form-input" type="password" placeholder="Repeat password">
      </div>
      <p id="reg-error" class="form-error mb-16 hidden"></p>
      <button id="reg-btn" class="btn btn-accent btn-full">Create Account</button>
    </div>

    <!-- Forgot password form -->
    <div id="form-forgot" class="hidden">
      <p class="text-gray text-sm mb-16">Enter your email and we'll send a reset link.</p>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="fp-email" class="form-input" type="email" placeholder="you@example.com">
      </div>
      <p id="fp-error" class="form-error mb-16 hidden"></p>
      <button id="fp-btn" class="btn btn-primary btn-full">Send Reset Link</button>
      <p class="text-center text-sm" style="margin-top:12px;"><a href="#" id="back-link">← Back to Sign In</a></p>
    </div>

  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-msg">Loading…</p>
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/core.js"></script>
<script>
(async () => {
  const { Auth, DB, authReady, dashboardFor, showLoading, hideLoading, showToast } = FCZ;

  // If already signed in, redirect immediately — no Firestore call needed
  // Firebase Auth state is local and resolves instantly from IndexedDB cache
  showLoading('Checking session…');
  const user = await Promise.race([
    authReady,
    new Promise(resolve => setTimeout(resolve, 2000))
  ]);
  hideLoading();
  if (user) {
    const role = localStorage.getItem('fcz_role') || 'farmer';
    window.location.href = dashboardFor(role);
    return;
  }

  // ── Tab switching ──────────────────────────────────────────────────────────
  const forms = { signin: 'form-signin', register: 'form-register', forgot: 'form-forgot' };

  function showForm(name) {
    Object.values(forms).forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById(forms[name]).classList.remove('hidden');
    document.getElementById('tab-signin').classList.toggle('active', name === 'signin');
    document.getElementById('tab-register').classList.toggle('active', name === 'register');
    // Hide Google button on forgot password screen, show on signin/register
    const googleBtn = document.getElementById('google-signin-btn');
    const googleDiv = document.getElementById('google-divider');
    const hidden = name === 'forgot';
    if (googleBtn) googleBtn.classList.toggle('hidden', hidden);
    if (googleDiv) googleDiv.classList.toggle('hidden', hidden);
  }

  document.getElementById('tab-signin').addEventListener('click',   () => showForm('signin'));
  document.getElementById('tab-register').addEventListener('click', () => showForm('register'));
  document.getElementById('forgot-link').addEventListener('click',  e => { e.preventDefault(); showForm('forgot'); });
  document.getElementById('back-link').addEventListener('click',    e => { e.preventDefault(); showForm('signin'); });

  function setError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.toggle('hidden', !msg);
  }

  function authErrMsg(code) {
    const map = {
      'auth/user-not-found':     'No account with that email.',
      'auth/wrong-password':     'Incorrect password.',
      'auth/invalid-email':      'Invalid email address.',
      'auth/email-already-in-use':'Email already registered.',
      'auth/weak-password':      'Password must be at least 6 characters.',
      'auth/too-many-requests':  'Too many attempts. Try again later.',
      'auth/network-request-failed':'Network error. Check your connection.'
    };
    return map[code] || 'Something went wrong. Please try again.';
  }

  // ── Sign in ────────────────────────────────────────────────────────────────
  document.getElementById('si-btn').addEventListener('click', async () => {
    const email    = document.getElementById('si-email').value.trim();
    const password = document.getElementById('si-password').value;
    setError('si-error', '');
    if (!email || !password) { setError('si-error', 'Enter email and password.'); return; }

    const btn = document.getElementById('si-btn');
    btn.textContent = 'Signing in…'; btn.disabled = true;
    try {
      const cred = await Auth.signInWithEmailAndPassword(email, password);
      // Always fetch role from Firestore on sign in so role changes take effect immediately
      let role = localStorage.getItem('fcz_role') || 'farmer';
      try {
        const snap = await DB.collection('users').doc(cred.user.uid).get();
        if (snap.exists) {
          role = snap.data().role || 'farmer';
          localStorage.setItem('fcz_role', role);
        }
      } catch (e) { /* offline — use cached role */ }
      window.location.href = dashboardFor(role);
    } catch (e) {
      console.error(e);
      setError('si-error', authErrMsg(e.code));
      btn.textContent = 'Sign In'; btn.disabled = false;
    }
  });

  // ── Register ───────────────────────────────────────────────────────────────
  document.getElementById('reg-btn').addEventListener('click', async () => {
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const phone    = document.getElementById('reg-phone').value.trim();
    const district = document.getElementById('reg-district').value;
    const role     = document.getElementById('reg-role').value;
    const pass     = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('reg-confirm').value;
    setError('reg-error', '');

    if (!name || !email || !district || !pass) { setError('reg-error', 'Please fill in all required fields.'); return; }
    if (pass !== confirm)                       { setError('reg-error', 'Passwords do not match.'); return; }
    if (pass.length < 6)                        { setError('reg-error', 'Password must be at least 6 characters.'); return; }

    const btn = document.getElementById('reg-btn');
    btn.textContent = 'Creating account…'; btn.disabled = true;
    try {
      const cred = await Auth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({ displayName: name });
      await DB.collection('users').doc(cred.user.uid).set({
        uid: cred.user.uid, name, email, phone, district, role,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      localStorage.setItem('fcz_role', role);
      showToast('Account created! Redirecting…', 'success');
      setTimeout(() => { window.location.href = dashboardFor(role); }, 800);
    } catch (e) {
      setError('reg-error', authErrMsg(e.code));
      btn.textContent = 'Create Account'; btn.disabled = false;
    }
  });

  // ── Forgot password ────────────────────────────────────────────────────────
  document.getElementById('fp-btn').addEventListener('click', async () => {
    const email = document.getElementById('fp-email').value.trim();
    setError('fp-error', '');
    if (!email) { setError('fp-error', 'Enter your email.'); return; }

    const btn = document.getElementById('fp-btn');
    btn.textContent = 'Sending…'; btn.disabled = true;
    try {
      await Auth.sendPasswordResetEmail(email);
      showToast('Reset link sent! Check your inbox.', 'success');
      showForm('signin');
    } catch (e) {
      setError('fp-error', authErrMsg(e.code));
    } finally {
      btn.textContent = 'Send Reset Link'; btn.disabled = false;
    }
  });

  // Allow Enter key to submit sign-in
  ['si-email','si-password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('si-btn').click();
    });
  });

  // ── Google Sign-In ────────────────────────────────────────────────────────
  document.getElementById('google-signin-btn').addEventListener('click', async () => {
    const btn = document.getElementById('google-signin-btn');
    btn.textContent = 'Signing in…'; btn.disabled = true;
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const cred = await Auth.signInWithPopup(provider);
      const user = cred.user;

      // Upsert user doc — create if new, leave role if existing
      const userRef = DB.collection('users').doc(user.uid);
      const snap = await userRef.get();
      let role = 'farmer';
      if (!snap.exists) {
        await userRef.set({
          uid: user.uid,
          name: user.displayName || '',
          email: user.email || '',
          phone: '',
          district: '',
          role: 'farmer',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      } else {
        role = snap.data().role || 'farmer';
      }
      localStorage.setItem('fcz_role', role);
      window.location.href = dashboardFor(role);
    } catch (e) {
      if (e.code !== 'auth/popup-closed-by-user') {
        showToast(e.message || 'Google sign-in failed', 'error');
      }
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg> Continue with Google';
      btn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
