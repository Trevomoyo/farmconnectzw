<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — FarmConnectZW</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <style>
        /* --- Layout Engine --- */
        .messages-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: calc(100vh - 140px);
            background: white;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
            margin-top: 10px;
        }

        #thread-list-container {
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            background: #fff;
            overflow-y: auto;
        }

        .message-item {
            padding: 15px;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
            transition: 0.2s;
        }
        .message-item:hover { background: #f9f9f9; }
        .message-item.active { background: #f0fdf4; border-right: 3px solid #2e7d32; }

        /* --- Unread Styling --- */
        .unread-dot {
            width: 10px;
            height: 10px;
            background-color: #2e7d32;
            border-radius: 50%;
            display: inline-block;
        }
        .text-bold { font-weight: bold; color: #000 !important; }

        /* --- Chat Window --- */
        #message-view {
            display: flex;
            flex-direction: column;
            background-color: #e5ddd5;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        .chat-header {
            padding: 10px 15px;
            background: #ededed;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            min-height: 60px;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .chat-bubble {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            line-height: 1.4;
        }
        .sent { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 2px; }
        .received { background: #fff; align-self: flex-start; border-top-left-radius: 2px; }

        .chat-footer {
            padding: 10px 15px;
            background: #f0f0f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        @media(max-width: 768px) {
            .messages-layout { grid-template-columns: 1fr; }
            #message-view { display: none; }
            .chat-open #thread-list-container { display: none; }
            .chat-open #message-view { display: flex; position: fixed; inset: 0; z-index: 999; }
        }
    </style>
</head>
<body>
    <div id="offline-banner" class="offline-banner">📡 Offline</div>
    <nav class="navbar" id="navbar"></nav>

    <main class="page">
        <div class="page-header flex-between mb-24">
            <h1>Chats</h1>
            <button class="btn btn-primary" id="new-chat-btn">➕ Start New Chat</button>
        </div>

        <div class="messages-layout">
            <div id="thread-list-container">
                <div id="thread-list"><p style="padding:20px;">Loading chats...</p></div>
            </div>

            <div id="message-view">
                <div style="margin:auto; text-align:center; color:#777;">
                    <div style="font-size:3rem;">💬</div>
                    <p>Select a contact to start chatting</p>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-bg" id="compose-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>New Chat</h3>
                <button class="modal-close" onclick="FCZ.closeModal('compose-modal')">✕</button>
            </div>
            <div class="form-group">
                <label class="form-label">Recipient Email</label>
                <input id="c-search" class="form-input" placeholder="Enter user email...">
            </div>
            <div class="form-group">
                <label class="form-label">Message</label>
                <textarea id="c-body" class="form-textarea" rows="3"></textarea>
            </div>
            <button id="start-chat-btn" class="btn btn-primary btn-full">Send Message</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script src="js/core.js"></script>
    <script src="js/navbar.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            if (typeof FCZ === "undefined") return;
            const { DB, getCurrentUser, openModal, closeModal, showToast, requireAuth, loadProfile, hideLoading, initNavbar, getRole } = FCZ;
            
            // Initial Auth Check
            const ok = await requireAuth();
            if (!ok) return;
            
            await loadProfile();
            
            // Initialize Navbar immediately
            initNavbar(); 
            if (typeof renderNavbar === "function") renderNavbar(getRole());
            
            hideLoading();

            const user = getCurrentUser();
            let activeChatId = null;
            let currentUnsubscribe = null;

            // Group messages into conversation threads
            async function loadConversations() {
                const list = document.getElementById("thread-list");
                try {
                    const [sent, received] = await Promise.all([
                        DB.collection("messages").where("senderId", "==", user.uid).get(),
                        DB.collection("messages").where("recipientId", "==", user.uid).get()
                    ]);

                    const allMsgs = [...sent.docs, ...received.docs].map(d => ({id: d.id, ...d.data()}));
                    const threads = {};

                    allMsgs.forEach(m => {
                        const otherId = (m.senderId === user.uid) ? m.recipientId : m.senderId;
                        const otherName = (m.senderId === user.uid) ? m.recipientName : m.senderName;
                        const isUnread = (m.recipientId === user.uid && m.seen === false);

                        if (!threads[otherId] || (m.createdAt?.seconds || 0) > (threads[otherId].time || 0)) {
                            threads[otherId] = { 
                                id: otherId, 
                                name: otherName || "User", 
                                text: m.text, 
                                time: m.createdAt?.seconds || 0,
                                unreadCount: isUnread ? 1 : 0
                            };
                        } else if (isUnread) {
                            threads[otherId].unreadCount++;
                        }
                    });

                    const sorted = Object.values(threads).sort((a,b) => b.time - a.time);
                    list.innerHTML = sorted.map(t => `
                        <div class="message-item ${activeChatId === t.id ? 'active' : ''}" onclick="openChat('${t.id}', '${t.name}')">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <strong>${t.name}</strong>
                                ${t.unreadCount > 0 ? '<span class="unread-dot"></span>' : ''}
                            </div>
                            <div class="text-sm ${t.unreadCount > 0 ? 'text-bold' : 'text-gray'}" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                                ${t.text}
                            </div>
                        </div>`).join("") || "<p style='padding:20px;'>No chats yet.</p>";
                } catch (err) { console.error("Thread Error:", err); }
            }

            // Real-time chat listener
            window.openChat = (otherId, otherName) => {
                if(currentUnsubscribe) currentUnsubscribe();
                activeChatId = otherId;
                document.querySelector(".messages-layout").classList.add("chat-open");

                // Listen for messages received by the user
                const unsub = DB.collection("messages")
                    .where('recipientId', '==', user.uid)
                    .onSnapshot(receivedSnap => {
                        // Mark messages from this specific sender as SEEN
                        receivedSnap.docs.forEach(doc => {
                            const m = doc.data();
                            if (m.senderId === otherId && m.seen === false) {
                                DB.collection("messages").doc(doc.id).update({ seen: true });
                            }
                        });

                        // Combine with sent messages for full view
                        DB.collection("messages")
                            .where('senderId', '==', user.uid)
                            .get().then(sentSnap => {
                                const allDocs = [...receivedSnap.docs, ...sentSnap.docs];
                                const msgs = allDocs
                                    .map(d => d.data())
                                    .filter(m => m.senderId === otherId || m.recipientId === otherId)
                                    .sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                                
                                renderChat(msgs, otherId, otherName);
                                loadConversations(); // Refresh dots in sidebar
                            });
                    });
                
                currentUnsubscribe = unsub;
            };

            function renderChat(msgs, otherId, otherName) {
                const view = document.getElementById("message-view");
                view.innerHTML = `
                    <div class="chat-header">
                        <button class="btn btn-sm" onclick="document.querySelector('.messages-layout').classList.remove('chat-open')" style="margin-right:10px;">←</button>
                        <strong>${otherName}</strong>
                    </div>
                    <div class="chat-body" id="chat-body">
                        ${msgs.map(m => `
                            <div class="chat-bubble ${m.senderId === user.uid ? 'sent' : 'received'}">
                                ${m.text}
                            </div>
                        `).join("")}
                    </div>
                    <div class="chat-footer">
                        <input id="chat-input" class="form-input" style="border-radius:20px;" placeholder="Type a message...">
                        <button class="btn btn-primary" style="border-radius:50%;" id="send-btn">➔</button>
                    </div>`;
                
                document.getElementById("send-btn").onclick = () => sendMessage(otherId, otherName);
                
                // Auto-scroll to latest
                const b = document.getElementById("chat-body");
                if(b) b.scrollTop = b.scrollHeight;
            }

            async function sendMessage(otherId, otherName) {
                const input = document.getElementById("chat-input");
                const text = input.value.trim();
                if(!text) return;
                
                try {
                    const senderName = user.displayName || user.email.split('@')[0];
                    await DB.collection("messages").add({
                        senderId: user.uid,
                        senderName,
                        recipientId: otherId,
                        recipientName: otherName,
                        text: text,
                        seen: false,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    input.value = "";
                    // Notify recipient via server push
                    if (FCZ.notifyNewMessage) FCZ.notifyNewMessage(otherId, senderName, text);
                    loadConversations();
                } catch (e) { showToast("Failed to send", "error"); }
            }

            // New Chat Logic
            document.getElementById("start-chat-btn").onclick = async () => {
                const email = document.getElementById("c-search").value.trim();
                const text = document.getElementById("c-body").value.trim();
                if(!email || !text) return;

                const snap = await DB.collection("users").where("email", "==", email).get();
                if(snap.empty) return showToast("User not found", "error");
                
                const target = snap.docs[0].data();
                const targetId = snap.docs[0].id;

                await DB.collection("messages").add({
                    senderId: user.uid,
                    senderName: user.displayName || user.email.split('@')[0],
                    recipientId: targetId,
                    recipientName: target.displayName || email,
                    text: text,
                    seen: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                closeModal("compose-modal");
                openChat(targetId, target.displayName || email);
            };

            document.getElementById("new-chat-btn").onclick = () => openModal("compose-modal");
            loadConversations();
        });
    </script>
</body>
</html>
